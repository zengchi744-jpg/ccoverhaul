name: Build CCOverhaul

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Add swap (prevent OOM)
        run: |
          sudo fallocate -l 8G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          free -h

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y git make gcc curl perl fakeroot p7zip-full

      - name: Install Theos
        run: |
          git clone --depth 1 --recursive https://github.com/theos/theos.git /opt/theos
          echo "THEOS=/opt/theos" >> $GITHUB_ENV

      - name: Get iOS SDK
        run: |
          mkdir -p /opt/theos/sdks
          curl -L --retry 3 \
            https://github.com/xybp888/iOS-SDKs/releases/download/13.1/iPhoneOS13.1.sdk.zip \
            -o /tmp/sdk.zip
          ls -lh /tmp/sdk.zip
          7z x /tmp/sdk.zip -o/opt/theos/sdks/ -y
          ls -la /opt/theos/sdks/

      - name: Build tweak
        run: |
          make package THEOS=/opt/theos
          ls -la packages/

      - name: Upload .deb
        uses: actions/upload-artifact@v4
        with:
          name: CCOverhaul-deb
          path: packages/*.deb
