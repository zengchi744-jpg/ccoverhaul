name: Build CCOverhaul

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y git make gcc curl perl fakeroot dpkg-dev

      - name: Install Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git /opt/theos
          echo "THEOS=/opt/theos" >> $GITHUB_ENV

      - name: Get iOS SDK
        run: |
          sudo apt install -y unzip
          curl -L https://github.com/xybp888/iOS-SDKs/releases/download/13.1/iPhoneOS13.1.sdk.zip -o /tmp/sdk.zip
          unzip -q /tmp/sdk.zip -d /opt/theos/sdks/
          ls /opt/theos/sdks/

      - name: Build tweak
        run: |
          make package
          ls -la packages/

      - name: Upload .deb
        uses: actions/upload-artifact@v4
        with:
          name: CCOverhaul-deb
          path: packages/*.deb
